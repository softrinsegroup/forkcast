name: Deploy to Railway

# Backend + frontend ship as ONE image (root Dockerfile builds the SPA into the
# FastAPI image). Deploys are release-gated: pushing a version tag runs the full
# test suite, and only if it passes does Railway build + deploy the tagged commit.
# The landing/ Astro site is decoupled and deployed separately (see README).
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

# One deploy at a time; a newer tag supersedes an in-flight run.
concurrency:
  group: railway-deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  backend-tests:
    name: Backend (ruff + pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      # asyncpg pool + yoyo migrations (sync driver) both read DATABASE_URL.
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/mealprep
      # vector store PGEngine reads ASYNC_DATABASE_URL.
      ASYNC_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/mealprep
    services:
      postgres:
        # pgvector image — migration 001 needs the `vector` extension
        # (citext for migration 004 ships in postgres-contrib, included here).
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: mealprep
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint (ruff)
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: Test (pytest)
        # Tests self-apply migrations via init_db(); Postgres just needs to be up.
        run: uv run pytest

  frontend-tests:
    name: Frontend (typecheck + vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck + build
        # `npm run build` == `tsc -b && vite build`, so this is the type gate too.
        run: npm run build

      - name: Test (vitest)
        run: npm test

  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Railway CLI
        run: npm i -g @railway/cli@4

      - name: Deploy
        # RAILWAY_TOKEN (a project token) authenticates the CLI non-interactively.
        # Railway builds the root Dockerfile from the uploaded source and deploys.
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service "${{ vars.RAILWAY_SERVICE }}" --ci
